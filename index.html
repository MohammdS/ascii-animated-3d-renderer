<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D ASCII Logo Previews</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: clamp(1rem, 5vw, 4rem);
        background: #edf3f7;
        color: #183247;
        font-family: system-ui, sans-serif;
      }
      main { width: min(1100px, 100%); margin: auto; }
      h1 { margin: 0 0 2rem; }
      h2 { margin: 2rem 0 0.75rem; }
      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 0.75rem;
        box-shadow: 0 1rem 3rem rgb(24 50 71 / 16%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>3D ASCII logo previews</h1>

      <h2>University of Haifa</h2>
      <img
        src="./haifa-logo-preview.gif"
        alt="Animated 3D ASCII art of the University of Haifa logo"
      />

      <h2>Geometric logo</h2>
      <img
        src="./second-logo-preview.gif"
        alt="Animated 3D ASCII art of the blue geometric logo"
      />
    </main>
  </body>
</html>
